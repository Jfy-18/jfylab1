<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书商城</title>
    <link rel="stylesheet" href="lab2-2504-132-index.css">
</head>
<body>
<!-- 头部：固定定位 + 浮动 -->
<div class="header">
    <div class="logo">图书商城</div>
    <ul class="nav">
        <li>首页</li>
        <li>图书分类</li>
        <li>热门推荐</li>
        <li>新书上市</li>
        <li>关于我们</li>
    </ul>
</div>

<!-- 主体容器 -->
<div class="container">
    <!-- 左侧导航：相对定位 -->
    <div class="left">
        <h3>图书分类</h3>
        <ul class="category">
            <li>计算机图书</li>
            <li>文学小说</li>
            <li>历史传记</li>
            <li>少儿读物</li>
            <li>考试教材</li>
        </ul>
    </div>

    <!-- 中间内容 -->
    <div class="middle">
        <div class="book-show">
            <!-- 父相子绝 -->
            <div class="book-item">
                <img src="1.webp" alt="图书封面">
                <div class="book-info">点击查看详情</div>
            </div>
            <div class="book-item"><img src="" alt="图书封面"></div>
            <div class="book-item"><img src="https://picsum.photos/200/280" alt="图书封面"></div>
        </div>

        <div class="hot">
            <h3>热门推荐</h3>
            <div class="hot-item">热门图书1</div>
            <div class="hot-item">热门图书2</div>
            <div class="hot-item">热门图书3</div>
        </div>

        <div class="new-book">
            <h3>新书上市</h3>
            <table border="1" cellpadding="8" cellspacing="0">
                <tr><th>书名</th><th>作者</th><th>价格</th></tr>
                <tr><td>HTML从入门到精通</td><td>张三</td><td>59元</td></tr>
                <tr><td>CSS设计指南</td><td>李四</td><td>49元</td></tr>
                <tr><td>JavaScript实战</td><td>王五</td><td>69元</td></tr>
            </table>
        </div>
    </div>

    <!-- 右侧广告：固定定位 -->
    <div class="right">
        <h3>促销信息</h3>
        <p>满100减20</p>
        <p>新书8折</p>
        <p>会员折上折</p>
    </div>
</div>
</body>
</html>
